# ============================================================
# tmux config
# ============================================================

# -- General --
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on
set -g display-time 2000

# -- Prefix --
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Pane splitting (keep cwd) --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# -- Vim-style pane navigation --
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Pane resize (repeatable) --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Quick reload --
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# -- Copy mode (vi) --
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ============================================================
# Status bar
# ============================================================

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# left: session name
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e] "

# right: host + time
set -g status-right-length 60
set -g status-right "#[fg=#585b70] #H  %H:%M "

# window tabs
setw -g window-status-format "#[fg=#585b70] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W #[fg=#a6e3a1,bg=#1e1e2e]"
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# message style
set -g message-style "fg=#cdd6f4,bg=#313244"

# ============================================================
# Plugins: session save/restore (防止 server 挂掉丢会话)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect: 保存窗口/布局/工作目录，并捕获每个 pane 的屏幕内容
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '~/.tmux/resurrect'

# continuum: 每 5 分钟自动保存；tmux 启动时自动恢复上次会话
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

# 手动: prefix + Ctrl-s 保存, prefix + Ctrl-r 恢复

# 初始化 TPM (必须放在配置最后一行)
run '~/.tmux/plugins/tpm/tpm'
